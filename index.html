<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Realms</title>
    <!-- ✅ Referencia obligatoria para webxdc (NO incluir en el ZIP) -->
    <script src="webxdc.js"></script>
    <style>
        body {
            margin: 0; 
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0f1a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #chat-container {
            flex: 1;
            background: #111827;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .message {
            max-width: 85%;
            padding: 13px 17px;
            border-radius: 18px;
            font-size: 15.8px;
            line-height: 1.48;
        }
        .bot-message { 
            background: #1f2937; 
            align-self: flex-start; 
            border-bottom-left-radius: 6px; 
        }
        .user-message { 
            background: #7c3aed; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 6px; 
        }
                .timestamp { 
            font-size: 11px;
            color: #94a3b8; 
            margin-top: 7px; 
            text-align: right; 
        }
        
        .quick-bar {
            background: #1e2937;
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        .quick-btn {
            background: #334155;
            color: #e2e8f0;
            border: none;
            padding: 10px 16px;
            border-radius: 9999px;
            font-size: 13.5px;
            cursor: pointer;
            white-space: nowrap;
            min-width: 60px;
            flex-shrink: 0;
        }
        .quick-btn:hover, .quick-btn:active { 
            background: #a78bfa; 
            color: white; 
        }
        
        .input-bar {
            background: #1e2937;
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #command-input {
            flex: 1;
            background: #334155;
            border: none;
            border-radius: 9999px;
            padding: 14px 20px;
            font-size: 16px;
            color: white;
            outline: none;
        }
        button {            background: #a78bfa;
            color: #0f172a;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        #welcome {
            position: absolute;
            inset: 0;
            background: #0a0f1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        
        .realm-btn {
            background: #1e2937;
            margin: 6px;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .realm-btn:hover, .realm-btn.selected {
            background: #a78bfa;
            color: #0f172a;
            transform: scale(1.05);
        }

        /* Colores por Tier */
        .tier-comun { color: #94a3b8; }
        .tier-poco-comun { color: #22c55e; }
        .tier-raro { color: #3b82f6; }
        .tier-epico { color: #a855f7; }
        .tier-legendario { color: #f59e0b; }
    </style>
</head>
<body>

    <div id="chat-container"></div>
    <div class="quick-bar">
        <button class="quick-btn" onclick="quickCommand('/me')">/me</button>
        <button class="quick-btn" onclick="quickCommand('/quest')">/quest</button>
        <button class="quick-btn" onclick="quickCommand('/dungeon')">/dungeon</button>
        <button class="quick-btn" onclick="quickCommand('/rest')">/rest</button>
        <button class="quick-btn" onclick="quickCommand('/equip')">/equip</button>
        <button class="quick-btn" onclick="quickCommand('/world')">/world</button>
        <button class="quick-btn" onclick="quickCommand('/help')">/help</button>
    </div>

    <div class="input-bar">
        <input type="text" id="command-input" placeholder="Comando (/me, /quest, /rest, /equip...)" autocomplete="off">
        <button onclick="sendCommand()">➤</button>
    </div>

    <div id="welcome">
        <div style="max-width: 460px;">
            <h1 style="font-size: 34px; margin-bottom: 10px; color: #c4b5fd;">🌌 Eternal Realms</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">RPG multijugador con mundo compartido.</p>
            
            <h3 style="margin-bottom: 12px; text-align:left;">Elige tu Reino</h3>
            <div id="realm-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); gap: 8px; margin-bottom: 30px;"></div>
            
            <h3 style="margin-bottom: 12px; text-align:left;">Elige tu Camino</h3>
            <select id="class-select" style="width:100%; padding:14px; border-radius:12px; background:#1e2937; color:white; border:none; margin-bottom:25px;">
                <option value="Arcane Weaver">🔮 Arcane Weaver</option>
                <option value="Shadowblade">🌑 Shadowblade</option>
                <option value="Stormcaller">⛈️ Stormcaller</option>
                <option value="Verdant Warden">🌿 Verdant Warden</option>
                <option value="Rune Knight">🛡️ Rune Knight</option>
            </select>
            
            <input id="player-name" type="text" value="Elyndor" placeholder="Nombre de tu Guardián"
                   style="width:100%; padding:14px; border-radius:12px; background:#1e2937; color:white; border:none; margin-bottom:25px;">
            
            <button onclick="startGame()" style="width:100%; padding:16px; background:#a78bfa; color:#0f172a; border:none; border-radius:9999px; font-size:18px; font-weight:600;">
                🌟 Unirse al Mundo Compartido
            </button>
        </div>
    </div>

    <script>
        // ✅ INICIALIZACIÓN SEGURA DE WEBXDC
        const isWebxdc = typeof window.webxdc !== 'undefined';
        
        // Función wrapper segura para enviar actualizaciones
        function safeSendUpdate(payload, info, summary) {
            if (isWebxdc) {
                window.webxdc.sendUpdate({ 
                    payload,                     info: info || '', 
                    summary: summary || '' 
                }, info || '');
            } else {
                // Modo standalone: solo loguear para debug
                console.log('[Webxdc mock]', { payload, info, summary });
            }
        }

        let myPlayer = {
            name: "Elyndor",
            realm: "Aetherion",
            class: "Arcane Weaver",
            level: 1,
            exp: 0,
            expMax: 100,
            gold: 0,
            stamina: 23,
            maxStamina: 23,
            mana: 10,
            maxMana: 10,
            atk: 1,
            def: 1,
            hp: 10,
            maxHp: 10,
            weapon: { name: "Bastón de Novato", atk: 0, tier: "comun", minLevel: 1 },
            armor: { name: "Túnica Gastada", def: 0, tier: "comun", minLevel: 1 },
            inventory: []
        };

        let worldState = {
            globalEssence: 12480,
            nextConvergence: "2h 45min",
            activeRealms: ["Aetherion", "Sylvandar", "Obsidian Reach"],
            totalGuardians: 1
        };

        let gameStarted = false;
        let currentMerchant = null;
        const realms = ["Aetherion", "Sylvandar", "Obsidian Reach", "Celestara", "Emberforge"];

        const tierConfig = {
            comun: { name: "Común", color: "#94a3b8", mult: 1.0 },
            "poco-comun": { name: "Poco Común", color: "#22c55e", mult: 1.5 },
            raro: { name: "Raro", color: "#3b82f6", mult: 2.2 },
            epico: { name: "Épico", color: "#a855f7", mult: 3.5 },
            legendario: { name: "Legendario", color: "#f59e0b", mult: 5.0 }
        };

        const possibleWeapons = [            { name: "Daga de Sombra", atk: 3, tier: "comun", minLevel: 1, price: 50 },
            { name: "Bastón Arcano", atk: 4, tier: "comun", minLevel: 1, price: 60 },
            { name: "Espada Corta", atk: 5, tier: "comun", minLevel: 3, price: 80 },
            { name: "Espada Rúnica", atk: 8, tier: "poco-comun", minLevel: 5, price: 150 },
            { name: "Arco de Viento", atk: 9, tier: "poco-comun", minLevel: 6, price: 170 },
            { name: "Martillo de Piedra", atk: 10, tier: "poco-comun", minLevel: 7, price: 190 },
            { name: "Cuchilla Obsidiana", atk: 15, tier: "raro", minLevel: 10, price: 350 },
            { name: "Bastón de Cristal", atk: 17, tier: "raro", minLevel: 12, price: 400 },
            { name: "Espada de Fuego", atk: 20, tier: "raro", minLevel: 15, price: 500 },
            { name: "Hoja del Vacío", atk: 30, tier: "epico", minLevel: 20, price: 800 },
            { name: "Martillo del Trueno", atk: 35, tier: "epico", minLevel: 25, price: 1000 },
            { name: "Arco Estelar", atk: 38, tier: "epico", minLevel: 28, price: 1200 },
            { name: "Excalibur Eterna", atk: 55, tier: "legendario", minLevel: 35, price: 2500 },
            { name: "Bastón de los Ancianos", atk: 60, tier: "legendario", minLevel: 40, price: 3000 },
            { name: "Guadaña del Alma", atk: 65, tier: "legendario", minLevel: 45, price: 3500 }
        ];

        const possibleArmors = [
            { name: "Cota de Malla Ligera", def: 3, tier: "comun", minLevel: 1, price: 50 },
            { name: "Túnica Reforzada", def: 4, tier: "comun", minLevel: 2, price: 65 },
            { name: "Armadura de Cuero", def: 5, tier: "comun", minLevel: 4, price: 85 },
            { name: "Armadura de Escamas", def: 8, tier: "poco-comun", minLevel: 5, price: 160 },
            { name: "Capa del Guardián", def: 10, tier: "poco-comun", minLevel: 7, price: 185 },
            { name: "Peto de Hierro", def: 12, tier: "poco-comun", minLevel: 9, price: 210 },
            { name: "Armadura de Mithril", def: 18, tier: "raro", minLevel: 10, price: 380 },
            { name: "Túnica Arcana", def: 20, tier: "raro", minLevel: 13, price: 430 },
            { name: "Placas de Dragón", def: 24, tier: "raro", minLevel: 16, price: 550 },
            { name: "Armadura del Vacío", def: 35, tier: "epico", minLevel: 20, price: 850 },
            { name: "Manto de las Estrellas", def: 40, tier: "epico", minLevel: 25, price: 1050 },
            { name: "Coraza Ancestral", def: 45, tier: "epico", minLevel: 30, price: 1300 },
            { name: "Armadura de los Dioses", def: 65, tier: "legendario", minLevel: 35, price: 2700 },
            { name: "Túnica del Archimago", def: 70, tier: "legendario", minLevel: 40, price: 3200 },
            { name: "Coraza del Dragón Anciano", def: 80, tier: "legendario", minLevel: 50, price: 4000 }
        ];

        const questFlavors = [
            "Caminaste por los bosques etéreos y recolectaste hierbas luminosas.",
            "Encontraste ruinas antiguas cubiertas de runas brillantes.",
            "Ayudaste a un espíritu perdido a encontrar el camino a casa.",
            "Descubriste una fuente de energía ancestral.",
            "Exploraste una cueva oculta llena de cristales flotantes.",
            "Observaste cómo las estrellas caían cerca del horizonte.",
            "Encontraste un campamento abandonado de antiguos guardianes.",
            "Recogiste frutos mágicos en un claro encantado.",
            "Seguiste el rastro de un animal mítico hasta su guarida.",
            "Descubriste un altar olvidado que aún conserva algo de poder."
        ];
        const emptyQuestFlavors = [
            "La zona estaba extrañamente silenciosa... no encontraste nada útil.",
            "Solo viento y niebla. Tu búsqueda no dio frutos esta vez.",            "El terreno era peligroso y decidiste regresar con las manos vacías.",
            "No hallaste ningún recurso valioso en esta exploración.",
            "Todo parecía normal, pero no había recompensa alguna."
        ];

        const merchantNames = [
            "Thoron el Mercader",
            "Lyra la Comerciante",
            "Grom el Herrero",
            "Elara la Encantadora",
            "Vex el Coleccionista",
            "Mira la Viajera"
        ];

        function saveProgress() {
            localStorage.setItem('eternalRealmsPlayer', JSON.stringify(myPlayer));
        }

        function loadProgress() {
            const saved = localStorage.getItem('eternalRealmsPlayer');
            if (saved) {
                myPlayer = JSON.parse(saved);
                return true;
            }
            return false;
        }

        function resetToNewHero() {
            myPlayer = {
                name: "Elyndor",
                realm: "Aetherion",
                class: "Arcane Weaver",
                level: 1,
                exp: 0,
                expMax: 100,
                gold: 0,
                stamina: 23,
                maxStamina: 23,
                mana: 10,
                maxMana: 10,
                atk: 1,
                def: 1,
                hp: 10,
                maxHp: 10,
                weapon: { name: "Bastón de Novato", atk: 0, tier: "comun", minLevel: 1 },
                armor: { name: "Túnica Gastada", def: 0, tier: "comun", minLevel: 1 },
                inventory: []
            };
            localStorage.removeItem('eternalRealmsPlayer');
            currentMerchant = null;        }

        function calculateStats() {
            myPlayer.atk = 1 + (myPlayer.level - 1) * 0.6 + myPlayer.weapon.atk;
            myPlayer.def = 1 + (myPlayer.level - 1) * 0.6 + myPlayer.armor.def;
            myPlayer.atk = Math.floor(myPlayer.atk);
            myPlayer.def = Math.floor(myPlayer.def);
        }

        function levelUpStats(isMilestone = false) {
            myPlayer.maxHp = Math.floor(myPlayer.maxHp * 1.08);
            myPlayer.maxStamina = Math.floor(myPlayer.maxStamina * 1.05);
            myPlayer.maxMana = Math.floor(myPlayer.maxMana * 1.07);

            if (isMilestone) {
                myPlayer.atk += 1;
                myPlayer.def += 1;
                myPlayer.maxHp = Math.floor(myPlayer.maxHp * 1.55);
            }

            myPlayer.hp = myPlayer.maxHp;
            myPlayer.stamina = myPlayer.maxStamina;
            myPlayer.mana = myPlayer.maxMana;
            calculateStats();
        }

        function getTierColor(tier) {
            return tierConfig[tier] ? tierConfig[tier].color : "#94a3b8";
        }

        function getTierName(tier) {
            return tierConfig[tier] ? tierConfig[tier].name : "Desconocido";
        }

        function addMessage(content, isBot = true) {
            const container = document.getElementById('chat-container');
            const msg = document.createElement('div');
            msg.className = `message ${isBot ? 'bot-message' : 'user-message'}`;
            const time = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
            msg.innerHTML = content + '<div class="timestamp">' + time + '</div>';
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // ✅ FUNCIÓN CORREGIDA - Template literals consistentes
        function showEquipment() {
            let msg = '🛡️ <strong>Equipo actual</strong><br>';
            
            const weaponTierColor = getTierColor(myPlayer.weapon.tier);
            const armorTierColor = getTierColor(myPlayer.armor.tier);            const weaponTierName = getTierName(myPlayer.weapon.tier);
            const armorTierName = getTierName(myPlayer.armor.tier);
            
            msg += `⚔️ Arma: <span style="color:${weaponTierColor}"><strong>${myPlayer.weapon.name}</strong></span> [${weaponTierName}] (+${myPlayer.weapon.atk} Ataque) <em style="color:#64748b">(Nvl ${myPlayer.weapon.minLevel}+)</em><br>`;
            msg += `🛡️ Armadura: <span style="color:${armorTierColor}"><strong>${myPlayer.armor.name}</strong></span> [${armorTierName}] (+${myPlayer.armor.def} Defensa) <em style="color:#64748b">(Nvl ${myPlayer.armor.minLevel}+)</em><br><br>`;
            
            if (myPlayer.inventory.length === 0) {
                msg += '🎒 Bolsa: Vacía';
            } else {
                msg += `🎒 <strong>Bolsa (${myPlayer.inventory.length} ítems)</strong><br>`;
                myPlayer.inventory.forEach((item, i) => {
                    const type = item.atk !== undefined ? '⚔️' : '🛡️';
                    const bonus = item.atk !== undefined ? `+${item.atk} Ataque` : `+${item.def} Defensa`;
                    const tierColor = getTierColor(item.tier);
                    const tierName = getTierName(item.tier);
                    const canEquip = myPlayer.level >= item.minLevel;
                    // ✅ CORRECCIÓN: template literal completo
                    const equipStatus = canEquip ? '' : ` <em style="color:#ef4444">(Nvl ${item.minLevel} requerido)</em>`;
                    
                    msg += `${i+1}. <span style="color:${tierColor}">${type} ${item.name}</span> [${tierName}] (${bonus})${equipStatus}<br>`;
                });
                msg += '<br>Escribe <strong>/equip N</strong> para equipar un ítem (ej: /equip 2)';
            }
            addMessage(msg);
        }

        // ✅ FUNCIÓN CORREGIDA - Template literals consistentes
        function showMerchant() {
            if (!currentMerchant) {
                addMessage('❌ No hay ningún mercader cerca. Explora más para encontrar uno.');
                return;
            }
            
            let msg = `🏪 <strong>${currentMerchant.name}</strong> te saluda<br>`;
            msg += '<em>"¡Bienvenido! Tengo artículos especiales para ti..."</em><br><br>';
            
            currentMerchant.items.forEach((item, i) => {
                const type = item.atk !== undefined ? '⚔️' : '🛡️';
                const bonus = item.atk !== undefined ? `+${item.atk} Ataque` : `+${item.def} Defensa`;
                const tierColor = getTierColor(item.tier);
                const tierName = getTierName(item.tier);
                const canAfford = myPlayer.gold >= item.price;
                const canEquip = myPlayer.level >= item.minLevel;
                
                msg += `${i+1}. <span style="color:${tierColor}">${type} ${item.name}</span> [${tierName}]<br>`;
                msg += `   ${bonus} | 💎 ${item.price} Cristales`;
                // ✅ CORRECCIÓN: template literal completo
                msg += canEquip ? '' : ` | <em style="color:#ef4444">(Nvl ${item.minLevel} requerido)</em>`;
                msg += '<br>';
            });            
            msg += '<br>Escribe <strong>/buy N</strong> para comprar un ítem (ej: /buy 1)';
            addMessage(msg);
        }

        function quickCommand(cmd) {
            document.getElementById('command-input').value = cmd;
            sendCommand();
        }

        function processCommand(cmd) {
            const lower = cmd.toLowerCase().trim();

            if (lower === '/me') {
                calculateStats();
                const weaponTierName = getTierName(myPlayer.weapon.tier);
                const armorTierName = getTierName(myPlayer.armor.tier);
                
                // ✅ CORRECCIÓN COMPLETA: todos template literals
                addMessage(
                    `🌌 <strong>${myPlayer.name}</strong> — ${myPlayer.class}<br>` +
                    `🏛️ Reino: ${myPlayer.realm}<br>` +
                    `📈 Nivel ${myPlayer.level} • ✨ Esencia: ${myPlayer.exp}/${myPlayer.expMax}<br>` +
                    `💎 Cristales: ${myPlayer.gold}<br>` +
                    `⚡ Energía: ${myPlayer.stamina}/${myPlayer.maxStamina}<br>` +
                    `🔮 Maná: ${myPlayer.mana}/${myPlayer.maxMana}<br>` +
                    `🗡️ Poder: ${myPlayer.atk} • 🛡️ Resistencia: ${myPlayer.def}<br>` +
                    `❤️ Vida: ${myPlayer.hp}/${myPlayer.maxHp}<br>` +
                    `⚔️ Arma: ${myPlayer.weapon.name} [${weaponTierName}] (+${myPlayer.weapon.atk})<br>` +
                    `🛡️ Armadura: ${myPlayer.armor.name} [${armorTierName}] (+${myPlayer.armor.def})`
                );
            } 
            else if (lower.includes('quest')) {
                if (myPlayer.stamina < 1) {
                    addMessage("❌ ⚠️ Tu energía vital está agotada.");
                    return;
                }
                myPlayer.stamina -= 1;

                if (Math.random() < 0.05 && myPlayer.level >= 3) {
                    const merchantName = merchantNames[Math.floor(Math.random() * merchantNames.length)];
                    const numItems = 2 + Math.floor(Math.random() * 2);
                    const items = [];
                    
                    for (let i = 0; i < numItems; i++) {
                        const isWeapon = Math.random() < 0.5;
                        const pool = isWeapon ? possibleWeapons : possibleArmors;
                        const filteredPool = pool.filter(item => 
                            item.tier !== 'comun' && 
                            item.minLevel <= myPlayer.level + 5 &&                            item.minLevel >= Math.max(1, myPlayer.level - 2)
                        );
                        
                        if (filteredPool.length > 0) {
                            const item = {...filteredPool[Math.floor(Math.random() * filteredPool.length)]};
                            items.push(item);
                        }
                    }
                    
                    if (items.length > 0) {
                        currentMerchant = { name: merchantName, items: items };
                        addMessage(`🏪 <strong>¡Encontraste a ${merchantName}!</strong><br>` +
                                  'Un mercader ambulante ofrece artículos especiales.<br>' +
                                  'Escribe <strong>/merchant</strong> para ver sus productos.');
                        
                        // ✅ Notificación webxdc opcional
                        if (isWebxdc) {
                            safeSendUpdate(
                                { type: 'merchant_found', merchant: merchantName, player: myPlayer.name },
                                `${myPlayer.name} encontró a ${merchantName}`,
                                `Mercader disponible`
                            );
                        }
                        
                        saveProgress();
                        return;
                    }
                }

                if (Math.random() < 0.40) {
                    const emptyText = emptyQuestFlavors[Math.floor(Math.random() * emptyQuestFlavors.length)];
                    addMessage('🌫️ ' + emptyText);
                } else {
                    const flavor = questFlavors[Math.floor(Math.random() * questFlavors.length)];
                    const expG = Math.floor(95 + Math.random() * 170);
                    const goldG = Math.floor(18 + Math.random() * 32);
                    
                    myPlayer.exp += expG;
                    myPlayer.gold += goldG;

                    addMessage(`🌿 ${flavor}<br>✨ +${expG} Esencia • 💎 +${goldG} Cristales`);

                    if (Math.random() < 0.05) {
                        if (Math.random() < 0.55) {
                            const newWeapon = {...possibleWeapons[Math.floor(Math.random() * possibleWeapons.length)]};
                            myPlayer.inventory.push(newWeapon);
                            const tierColor = getTierColor(newWeapon.tier);
                            const tierName = getTierName(newWeapon.tier);
                            addMessage(`⚔️ ¡Encontraste un arma! <span style="color:${tierColor}"><strong>${newWeapon.name}</strong></span> [${tierName}] (+${newWeapon.atk} Ataque)`);
                        } else {                            const newArmor = {...possibleArmors[Math.floor(Math.random() * possibleArmors.length)]};
                            myPlayer.inventory.push(newArmor);
                            const tierColor = getTierColor(newArmor.tier);
                            const tierName = getTierName(newArmor.tier);
                            addMessage(`🛡️ ¡Encontraste una armadura! <span style="color:${tierColor}"><strong>${newArmor.name}</strong></span> [${tierName}] (+${newArmor.def} Defensa)`);
                        }
                    }

                    if (myPlayer.exp >= myPlayer.expMax) {
                        const newLevel = myPlayer.level + 1;
                        const isMilestone = (newLevel % 5 === 0);
                        
                        myPlayer.level = newLevel;
                        myPlayer.exp = 0;
                        myPlayer.expMax = Math.floor(myPlayer.expMax * 1.55);
                        
                        levelUpStats(isMilestone);                        
                        const milestoneMsg = isMilestone ? '<br><strong>¡Hito alcanzado!</strong> Poder y Resistencia +1 • Vida aumentada significativamente.' : '';
                        addMessage(`🌟 <strong>¡Ascensión!</strong> Nivel ${myPlayer.level} alcanzado ✨${milestoneMsg}`);
                        
                        // ✅ Notificación de nivel para otros jugadores
                        if (isWebxdc) {
                            safeSendUpdate(
                                { type: 'level_up', player: myPlayer.name, level: myPlayer.level, milestone: isMilestone },
                                `${myPlayer.name} alcanzó nivel ${myPlayer.level}`,
                                `Nivel ${myPlayer.level}${isMilestone ? ' ⭐' : ''}`
                            );
                        }
                    }
                }
            } 
            else if (lower === '/dungeon') {
                if (myPlayer.stamina < 3) {
                    addMessage("❌ No tienes suficiente energía para una Mazmorra.");
                    return;
                }
                myPlayer.stamina -= 3;
                const dmg = Math.floor(22 + Math.random() * 38);
                myPlayer.hp = Math.max(1, myPlayer.hp - dmg);
                const reward = Math.floor(75 + Math.random() * 125);
                myPlayer.gold += reward;

                addMessage(`🕳️ <strong>Mazmorra explorada</strong><br>❤️ Daño: ${dmg}<br>💎 Recompensa: +${reward} Cristales`);

                if (Math.random() < 0.10) {
                    if (Math.random() < 0.5) {
                        const newWeapon = {...possibleWeapons[Math.floor(Math.random() * possibleWeapons.length)]};
                        myPlayer.inventory.push(newWeapon);
                        const tierColor = getTierColor(newWeapon.tier);
                        const tierName = getTierName(newWeapon.tier);                        addMessage(`⚔️ ¡Encontraste un arma en la mazmorra! <span style="color:${tierColor}"><strong>${newWeapon.name}</strong></span> [${tierName}]`);
                    } else {
                        const newArmor = {...possibleArmors[Math.floor(Math.random() * possibleArmors.length)]};
                        myPlayer.inventory.push(newArmor);
                        const tierColor = getTierColor(newArmor.tier);
                        const tierName = getTierName(newArmor.tier);
                        addMessage(`🛡️ ¡Encontraste una armadura en la mazmorra! <span style="color:${tierColor}"><strong>${newArmor.name}</strong></span> [${tierName}]`);
                    }
                }
            } 
            else if (lower === '/rest') {
                const restoredHp = myPlayer.maxHp - myPlayer.hp;
                const restoredStamina = myPlayer.maxStamina - myPlayer.stamina;
                
                myPlayer.hp = myPlayer.maxHp;
                myPlayer.stamina = myPlayer.maxStamina;

                addMessage(`🌙 <strong>Descanso completo</strong><br>` +
                          `❤️ Vida restaurada: +${restoredHp}<br>` +
                          `⚡ Energía restaurada: +${restoredStamina}`);
            } 
            else if (lower === '/equip') {
                showEquipment();
            } 
            else if (lower.startsWith('/equip ')) {
                const num = parseInt(lower.split(' ')[1]);
                if (!isNaN(num) && num > 0 && num <= myPlayer.inventory.length) {
                    const item = myPlayer.inventory[num - 1];
                    
                    if (myPlayer.level < item.minLevel) {
                        // ✅ CORRECCIÓN: template literal
                        addMessage(`❌ <strong>¡Nivel insuficiente!</strong> Necesitas nivel ${item.minLevel} para equipar ${item.name}.`);
                        return;
                    }
                    
                    if (item.atk !== undefined) {
                        myPlayer.weapon = item;
                        const tierColor = getTierColor(item.tier);
                        const tierName = getTierName(item.tier);
                        addMessage(`⚔️ Equipaste: <span style="color:${tierColor}"><strong>${item.name}</strong></span> [${tierName}] (+${item.atk} Ataque)`);
                    } else {
                        myPlayer.armor = item;
                        const tierColor = getTierColor(item.tier);
                        const tierName = getTierName(item.tier);
                        addMessage(`🛡️ Equipaste: <span style="color:${tierColor}"><strong>${item.name}</strong></span> [${tierName}] (+${item.def} Defensa)`);
                    }
                    myPlayer.inventory.splice(num - 1, 1);
                    calculateStats();
                } else {
                    addMessage('❌ Número inválido. Usa /equip seguido del número del ítem.');                }
            }
            else if (lower === '/merchant') {
                showMerchant();
            }
            else if (lower.startsWith('/buy ')) {
                if (!currentMerchant) {
                    addMessage('❌ No hay ningún mercader cerca. Usa /quest para encontrar uno.');
                    return;
                }
                
                const num = parseInt(lower.split(' ')[1]);
                if (!isNaN(num) && num > 0 && num <= currentMerchant.items.length) {
                    const item = currentMerchant.items[num - 1];
                    
                    if (myPlayer.level < item.minLevel) {
                        addMessage(`❌ <strong>¡Nivel insuficiente!</strong> Necesitas nivel ${item.minLevel} para comprar ${item.name}.`);
                        return;
                    }
                    
                    if (myPlayer.gold < item.price) {
                        addMessage(`❌ <strong>¡No tienes suficientes cristales!</strong> Necesitas ${item.price} 💎 pero tienes ${myPlayer.gold} 💎`);
                        return;
                    }
                    
                    myPlayer.gold -= item.price;
                    myPlayer.inventory.push(item);
                    const tierColor = getTierColor(item.tier);
                    const tierName = getTierName(item.tier);
                    addMessage(`✅ <strong>¡Compra exitosa!</strong> Adquiriste <span style="color:${tierColor}">${item.name}</span> [${tierName}] por ${item.price} 💎`);
                    
                    currentMerchant = null;
                    saveProgress();
                } else {
                    addMessage('❌ Número inválido. Usa /buy seguido del número del ítem.');
                }
            }
            else if (lower === '/world') {
                addMessage(`🌍 <strong>Estado del Mundo Compartido</strong><br>` +
                          `✨ Esencia global: ${worldState.globalEssence}<br>` +
                          `🌀 Próxima Convergencia: ${worldState.nextConvergence}<br>` +
                          `👥 Guardianes activos: ${worldState.totalGuardians}`);
            } 
            else if (lower === '/help') {
                addMessage('🌠 <strong>Comandos disponibles:</strong><br>' +
                          '/me — Ver tus estadísticas<br>' +
                          '/quest — Explorar las tierras (5% drop, 5% mercader)<br>' +
                          '/dungeon — Entrar en mazmorra (10% drop)<br>' +
                          '/rest — Descansar completamente<br>' +
                          '/equip — Ver equipo e inventario<br>' +                          '/equip N — Equipar ítem número N<br>' +
                          '/merchant — Ver mercader actual<br>' +
                          '/buy N — Comprar ítem del mercader<br>' +
                          '/world — Ver estado global<br>' +
                          '/help — Esta ayuda<br><br>' +
                          '<strong>Sistema de Tiers:</strong><br>' +
                          '<span style="color:#94a3b8">⚪ Común</span> | ' +
                          '<span style="color:#22c55e">🟢 Poco Común</span> | ' +
                          '<span style="color:#3b82f6">🔵 Raro</span> | ' +
                          '<span style="color:#a855f7">🟣 Épico</span> | ' +
                          '<span style="color:#f59e0b">🟠 Legendario</span>');
            } 
            else if (lower === '/reset') {
                addMessage('⚠️ <strong>Reiniciando personaje...</strong><br>Se borrará todo el progreso.');
                resetToNewHero();
                gameStarted = false;
                document.getElementById('welcome').style.display = 'flex';
                document.getElementById('chat-container').innerHTML = '';
                addMessage('🌌 El mundo se ha reiniciado. Crea un nuevo guardián.', true);
                return;
            } 
            else {
                addMessage(`🌫️ Comando recibido: <strong>${cmd}</strong>`);
            }
            
            saveProgress();
        }

        function sendCommand() {
            const input = document.getElementById('command-input');
            const cmd = input.value.trim();
            if (!cmd || !gameStarted) return;
            
            addMessage(`<strong>${cmd}</strong>`, false);
            input.value = '';
            processCommand(cmd);
        }

        function createRealmButtons() {
            const grid = document.getElementById('realm-grid');
            grid.innerHTML = '';
            realms.forEach(r => {
                const btn = document.createElement('div');
                btn.className = 'realm-btn';
                btn.textContent = `🌌 ${r}`;
                btn.onclick = () => {
                    myPlayer.realm = r;
                    document.querySelectorAll('.realm-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                };                grid.appendChild(btn);
            });
        }

        function startGame() {
            const nameInput = document.getElementById('player-name').value.trim();
            if (nameInput) myPlayer.name = nameInput;
            myPlayer.class = document.getElementById('class-select').value;
            
            if (!loadProgress()) {
                resetToNewHero();
                if (nameInput) myPlayer.name = nameInput;
                myPlayer.class = document.getElementById('class-select').value;
                const selectedRealmBtn = document.querySelector('.realm-btn.selected');
                if (selectedRealmBtn) {
                    myPlayer.realm = selectedRealmBtn.textContent.replace('🌌 ', '');
                }
            }
            
            document.getElementById('welcome').style.display = 'none';
            gameStarted = true;
            calculateStats();
            
            addMessage(`🌌 <strong>${myPlayer.name}</strong> se ha unido desde <strong>${myPlayer.realm}</strong> ✨`);
            
            // ✅ Notificación de inicio para otros jugadores
            if (isWebxdc) {
                safeSendUpdate(
                    { type: 'player_join', player: myPlayer.name, realm: myPlayer.realm, class: myPlayer.class },
                    `${myPlayer.name} se unió desde ${myPlayer.realm}`,
                    `Nuevo guardián: ${myPlayer.name}`
                );
            }
            
            saveProgress();
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendCommand();
        });

        // ✅ MEJORA: Auto-guardar al cambiar visibilidad (más confiable que unload)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                saveProgress();
            }
        });

        // ✅ INICIALIZACIÓN DE LISTENER PARA MULTIPLAYER (opcional)
        function initWebxdcListener() {            if (isWebxdc && typeof window.webxdc.setUpdateListener === 'function') {
                window.webxdc.setUpdateListener((update) => {
                    // Procesar actualizaciones de otros jugadores
                    const { payload } = update;
                    if (payload?.type === 'level_up') {
                        addMessage(`🌟 <em>${payload.player} alcanzó nivel ${payload.level}${payload.milestone ? ' ⭐' : ''}</em>`, true);
                    } else if (payload?.type === 'merchant_found') {
                        addMessage(`🏪 <em>${payload.player} encontró a ${payload.merchant}</em>`, true);
                    } else if (payload?.type === 'player_join' && payload.player !== myPlayer.name) {
                        addMessage(`✨ <em>${payload.player} se unió desde ${payload.realm} como ${payload.class}</em>`, true);
                    }
                    // Aquí puedes agregar más tipos de eventos...
                }, 0);
            }
        }

        window.onload = () => {
            createRealmButtons();
            initWebxdcListener(); // ✅ Inicializar listener de webxdc
            
            if (loadProgress()) {
                document.getElementById('welcome').style.display = 'none';
                gameStarted = true;
                calculateStats();
                addMessage(`🌌 Bienvenido de vuelta, <strong>${myPlayer.name}</strong> ✨`);
            } else {
                addMessage("🌠 <strong>Eternal Realms</strong><br>Mundo compartido listo. Crea tu guardián para comenzar.", true);
            }
        };
    </script>
</body>
</html>
