            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #chat-container {
            flex: 1;
            background: #111827;

            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

            padding: 13px 17px;
            border-radius: 18px;
            font-size: 15.8px;
            line-height: 1.48;
        }
        .bot-message { 
            background: #1f2937; 
            align-self: flex-start; 
            border-bottom-left-radius: 6px; 
        }
        .user-message { 
            background: #7c3aed; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 6px;

                .timestamp { 
            font-size: 11px;
            color: #94a3b8; 
            margin-top: 7px; 
            text-align: right; 
        }

            background: #1e2937;

            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        .quick-btn {
            background: #334155;
            color: #e2e8f0;
            border: none;
            padding: 10px 16px;
            border-radius: 9999px;
            font-size: 13.5px;
            cursor: pointer;
            white-space: nowrap;
            min-width: 60px;
            flex-shrink: 0;
        }
        .quick-btn:hover, .quick-btn:active { 
            background: #a78bfa; 
            color: white; 
        }
        
        .input-bar {
            background: #1e2937;
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #command-input {
            flex: 1;
            background: #334155;
            border: none;
            border-radius: 9999px;
            padding: 14px 20px;
            font-size: 16px;
            color: white;
            outline: none;
        }
        button {            background: #a78bfa;
            color: #0f172a;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        #welcome {
            position: absolute;
            inset: 0;
            background: #0a0f1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;

        }

            border-radius: 12px;

        function calculateStats() {
            myPlayer.atk = 1 + (myPlayer.level - 1) * 0.6 + myPlayer.weapon.atk;
            myPlayer.def = 1 + (myPlayer.level - 1) * 0.6 + myPlayer.armor.def;
            myPlayer.atk = Math.floor(myPlayer.atk);
            myPlayer.def = Math.floor(myPlayer.def);
        }

        function levelUpStats(isMilestone = false) {
            myPlayer.maxHp = Math.floor(myPlayer.maxHp * 1.08);
            myPlayer.maxStamina = Math.floor(myPlayer.maxStamina * 1.05);
            myPlayer.maxMana = Math.floor(myPlayer.maxMana * 1.07);

            if (isMilestone) {
                myPlayer.atk += 1;
                myPlayer.def += 1;
                myPlayer.maxHp = Math.floor(myPlayer.maxHp * 1.55);
            }

            myPlayer.hp = myPlayer.maxHp;
            myPlayer.stamina = myPlayer.maxStamina;
            myPlayer.mana = myPlayer.maxMana;
            calculateStats();
        }

        function addMessage(content, isBot = true) {
            const container = document.getElementById('chat-container');
            const msg = document.createElement('div');
            msg.className = `message ${isBot ? 'bot-message' : 'user-message'}`;
            const time = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
            msg.innerHTML = content + '<div class="timestamp">' + time + '</div>';
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function getEventDescription(effect) {
            const descriptions = {
                'double_exp': '¡Experiencia duplicada!',
                'discount': 'Descuento del 30% en mercaderes',
                'hard_mode': 'Enemigos más fuertes pero mejores recompensas',

                'free_item': 'Posibilidad de encontrar ítems gratis'
            };
            return descriptions[effect] || 'Evento especial activo';
        }
        
        // Viajar entre regiones
        function travelToRegion(regionName) {
            const target = regions.find(r => r.name.toLowerCase() === regionName.toLowerCase());
            
            if (!target) {
                addMessage(`❌ Región "${regionName}" no encontrada. Usa /regions para ver las disponibles.`);
                return;
            }
            
            if (myPlayer.level < target.minLevel) {
                addMessage(`❌ Nivel insuficiente. Necesitas nivel ${target.minLevel} para viajar a ${target.name}.`);
                return;
            }
            
            if (target.name === currentRegion.name) {
                addMessage(`📍 Ya estás en ${target.name}.`);
                return;
            }
            
            currentRegion = target;
            myPlayer.region = target.name;
            addMessage(`🚶 Viajaste a <strong>${target.name}</strong>.<br><em>${target.desc}</em>`);
            
            // Posible encuentro aleatorio al viajar
            if (Math.random() < 0.15) {
                setTimeout(() => {
                    triggerRandomEvent();
                }, 500);
            }
            
            saveProgress();
        }
        
        // Activar evento aleatorio
        function triggerRandomEvent() {
            const roll = Math.random();
            let cumulative = 0;
            
            for (const event of randomEvents) {
                cumulative += event.chance;
                if (roll <= cumulative) {
                    activeEvent = event;
                    addMessage(`⚡ <strong>¡${event.name}!</strong><br><em>${getEventDescription(event.effect)}</em>`);
                    
                    // Limpiar evento después de su duración
                    if (eventTimer) clearTimeout(eventTimer);
                    eventTimer = setTimeout(() => {
                        activeEvent = null;
                        addMessage(`✨ El evento ${event.name} ha terminado.`);
                    }, event.duration * 60000);
                    
                    return;
                }
            }
        }

            }

            }
            if (ability.shield) {
                msg += `🛡️ Escudo: ${(ability.shield * 100)}% de vida máxima<br>`;
            }
            
            msg += `🔮 Costo de maná: ${ability.manaCost}<br>`;
            msg += `⏱️ Cooldown: ${ability.cooldown} turns<br>`;
            
            const ready = myPlayer.cooldowns.ability <= 0 && myPlayer.mana >= ability.manaCost;
            msg += `<br>${ready ? '✅ <strong>¡Lista para usar!</strong>' : '⏳ En cooldown o maná insuficiente'}`;
            msg += '<br><br><em>Usa /ability para activarla</em>';
            
            addMessage(msg);
        }
        
        // Usar habilidad de clase
        function useAbility() {
            const ability = classAbilities[myPlayer.class];
            if (!ability) return;
            
            if (myPlayer.cooldowns.ability > 0) {
                addMessage(`⏳ Tu habilidad está en cooldown (${myPlayer.cooldowns.ability} turnos restantes).`);
                return;
            }
            
            if (myPlayer.mana < ability.manaCost) {
                addMessage(`❌ Maná insuficiente. Necesitas ${ability.manaCost} 🔮.`);
                return;
            }
            
            myPlayer.mana -= ability.manaCost;
            myPlayer.cooldowns.ability = ability.cooldown;
            
            let msg = `✨ <strong>¡${ability.name}!</strong><br>`;
            
            if (ability.damage) {
                const dmg = Math.floor(myPlayer.atk * ability.damage * currentRegion.difficulty);
                msg += `💥 Infliges <strong>${dmg}</strong> de daño.<br>`;
                const expGain = Math.floor(dmg * 0.5);
                myPlayer.exp += expGain;
                msg += `✨ +${expGain} Esencia`;
            }
            
            if (ability.heal) {
                const heal = Math.floor(myPlayer.maxHp * ability.heal);
                const actualHeal = Math.min(heal, myPlayer.maxHp - myPlayer.hp);
                myPlayer.hp += actualHeal;
                msg += `💚 Recuperas <strong>${actualHeal}</strong> de vida.`;
            }
            
            if (ability.shield) {
                const shield = Math.floor(myPlayer.maxHp * ability.shield);
                msg += `🛡️ Ganas un escudo de <strong>${shield}</strong> HP temporales.`;
            }
            
            addMessage(msg);
            checkLevelUp();
            saveProgress();
        }
        
        // Sistema de crafteo
        function showCrafting() {
            let msg = '⚒️ <strong>Crafteo Disponible</strong><br><br>';
            
            craftingRecipes.forEach((recipe, i) => {
                const canCraft = canCraftRecipe(recipe);
                msg += `${i+1}. <strong>${recipe.name}</strong> (${recipe.type})<br>`;
                msg += '   Materiales:<br>';
                recipe.materials.forEach(mat => {
                    const has = myPlayer.materials[mat.name] || 0;
                    const ok = has >= mat.qty;
                    msg += `   - ${mat.name}: ${has}/${mat.qty} ${ok ? '✅' : '❌'}<br>`;
                });
                msg += canCraft ? '   <em style="color:#22c55e">✅ Puedes crafter</em>' : '   <em style="color:#ef4444">❌ Faltan materiales</em>';
                msg += '<br><br>';
            });
            
            msg += '<em>Usa /craft [número] para crear un ítem</em>';
            addMessage(msg);
        }
        
        function canCraftRecipe(recipe) {
            for (const mat of recipe.materials) {
                if ((myPlayer.materials[mat.name] || 0) < mat.qty) {
                    return false;
                }
            }
            return true;
        }
        
        function craftItem(recipeNum) {
            const recipe = craftingRecipes[recipeNum - 1];
            if (!recipe) {
                addMessage('❌ Receta inválida.');
                return;
            }
            
            if (!canCraftRecipe(recipe)) {
                addMessage('❌ No tienes suficientes materiales.');
                return;
            }
            
            // Consumir materiales
            for (const mat of recipe.materials) {
                myPlayer.materials[mat.name] -= mat.qty;
                if (myPlayer.materials[mat.name] <= 0) {
                    delete myPlayer.materials[mat.name];
                }
            }
            
            // Crear ítem
            if (recipe.type === 'consumable') {
                myPlayer.consumables.push({ name: recipe.name, effect: recipe.effect, value: recipe.value, duration: recipe.duration });
                addMessage(`✅ <strong>¡Crafteaste ${recipe.name}!</strong><br>Efecto: ${recipe.effect === 'atk_boost' ? '+' + recipe.value + ' ATK' : '+' + recipe.value + ' DEF'} por ${recipe.duration} turnos.`);
            } else if (recipe.type === 'accessory') {
                const newItem = { 
                    name: recipe.name, 
                    tier: recipe.tier, 
                    minLevel: Math.max(1, myPlayer.level),
                    ...(recipe.atk ? { atk: recipe.atk } : {}),
                    ...(recipe.def ? { def: recipe.def } : {})
                };
                myPlayer.inventory.push(newItem);
                const tierColor = getTierColor(recipe.tier);
                addMessage(`✅ <strong>¡Crafteaste ${recipe.name}!</strong><br><span style="color:${tierColor}">${recipe.atk ? '+' + recipe.atk + ' ATK' : '+' + recipe.def + ' DEF'}</span>`);
            }
            
            myPlayer.stats.totalItemsCrafted++;
            saveProgress();
        }

        function showDailyQuests() {
            let msg = '📜 <strong>Misiones Diarias</strong><br><br>';

                const completed = myPlayer.dailyProgress.completedToday.includes(q.id);

        function getDailyQuestProgress(quest) {
            switch(quest.id) {
                case 'explorer': return myPlayer.dailyProgress.questsCompleted;
                case 'warrior': return myPlayer.dailyProgress.dungeonsCompleted;
                case 'collector': return myPlayer.dailyProgress.itemsFound;
                case 'survivor': return myPlayer.dailyProgress.restsDone;
                case 'merchant': return myPlayer.dailyProgress.merchantPurchases;
                case 'champion': return myPlayer.dailyProgress.milestonesReached;
                default: return 0;
            }
        }
        
        function checkDailyQuests() {
            // Verificar si es un nuevo día
            const today = new Date().toDateString();
            if (myPlayer.dailyProgress.lastReset !== today) {
                myPlayer.dailyProgress = {
                    questsCompleted: 0,
                    dungeonsCompleted: 0,
                    itemsFound: 0,
                    restsDone: 0,
                    merchantPurchases: 0,
                    milestonesReached: 0,
                    completedToday: [],
                    lastReset: today
                };
                addMessage('🌅 <strong>¡Nuevo día!</strong> Las misiones diarias han sido reiniciadas.');
            }
        }
        
        function claimDailyReward(questId) {
            const quest = dailyQuests.find(q => q.id === questId);
            if (!quest) {
                addMessage('❌ Misión inválida.');
                return;
            }
            
            if (myPlayer.dailyProgress.completedToday.includes(questId)) {
                addMessage('❌ Ya reclamaste esta recompensa hoy.');
                return;
            }
            
            const progress = getDailyQuestProgress(quest);
            if (progress < quest.target) {
                addMessage(`❌ Aún no completaste esta misión. Progreso: ${progress}/${quest.target}`);
                return;
            }
            
            myPlayer.dailyProgress.completedToday.push(questId);
            myPlayer.exp += quest.rewardExp;
            myPlayer.gold += quest.rewardGold;
            
            addMessage(`🎁 <strong>¡Recompensa reclamada!</strong><br>✨ +${quest.rewardExp} Esencia | 💎 +${quest.rewardGold} Cristales`);
            checkLevelUp();
            saveProgress();
        }

        function sendCommand() {
            const input = document.getElementById('command-input');

            if (!cmd || !gameStarted) return;
            
            addMessage(`<strong>${cmd}</strong>`, false);
            input.value = '';
            processCommand(cmd);
        }

                btn.className = 'realm-btn';
                btn.textContent = `🌌 ${r}`;

                    document.querySelectorAll('.realm-btn').forEach(b => b.classList.remove('selected'));

            const nameInput = document.getElementById('player-name').value.trim();
            if (nameInput) myPlayer.name = nameInput;
            myPlayer.class = document.getElementById('class-select').value;
            
            if (!loadProgress()) {
                resetToNewHero();
                if (nameInput) myPlayer.name = nameInput;
                myPlayer.class = document.getElementById('class-select').value;
                const selectedRealmBtn = document.querySelector('.realm-btn.selected');
                if (selectedRealmBtn) {
                    myPlayer.realm = selectedRealmBtn.textContent.replace('🌌 ', '');
                }
            }
            
            document.getElementById('welcome').style.display = 'none';
            gameStarted = true;
            calculateStats();
            
            addMessage(`🌌 <strong>${myPlayer.name}</strong> se ha unido desde <strong>${myPlayer.realm}</strong> ✨`);
            
            // ✅ Notificación de inicio para otros jugadores
            if (isWebxdc) {
                safeSendUpdate(
                    { type: 'player_join', player: myPlayer.name, realm: myPlayer.realm, class: myPlayer.class },
                    `${myPlayer.name} se unió desde ${myPlayer.realm}`,
                    `Nuevo guardián: ${myPlayer.name}`
                );
            }
            
            saveProgress();
        }

        let arenaStreak = 0;
        let inArena = false;

        function enterArena() {
            if (myPlayer.stamina < 2) { addMessage('❌ Necesitas al menos 2 de energía para entrar a la Arena.'); return; }
            myPlayer.stamina -= 2;
            inArena = true;
            const opponentLevel = Math.max(1, myPlayer.level + Math.floor(Math.random() * 5) - 2);
            const opponentAtk = Math.floor(opponentLevel * 2.5 + Math.random() * 10);
            let playerHitChance = 0.7 + (myPlayer.atk / (opponentAtk + myPlayer.atk)) * 0.3;
            let playerWon = Math.random() < playerHitChance;
            
            if (playerWon) {
                arenaStreak++;
                const rewardGold = Math.floor(50 + opponentLevel * 15 + arenaStreak * 10);
                const rewardExp = Math.floor(80 + opponentLevel * 20 + arenaStreak * 15);
                myPlayer.gold += rewardGold;
                myPlayer.exp += rewardExp;
                myPlayer.stats.arenaWins = (myPlayer.stats.arenaWins || 0) + 1;
                addMessage(`🏟️ <strong>¡Victoria en la Arena!</strong><br>Derrotaste a tu oponente (Nivel ${opponentLevel})<br>🔥 Racha actual: ${arenaStreak}<br>💎 Recompensa: ${rewardGold} Cristales<br>✨ Experiencia: ${rewardExp}`);
                if (isWebxdc && arenaStreak >= 3) {
                    safeSendUpdate({ type: 'arena_victory', player: myPlayer.name, streak: arenaStreak }, `${myPlayer.name} tiene racha de ${arenaStreak} en Arena`, `Racha: ${arenaStreak}`);
                }
                if (arenaStreak % 5 === 0) { addMessage(`🎉 ¡Bonus por racha de ${arenaStreak} victorias! +100 💎`); myPlayer.gold += 100; }
            } else {
                arenaStreak = 0;
                myPlayer.hp = Math.max(1, myPlayer.hp - Math.floor(opponentAtk * 0.5));
                addMessage(`💀 <strong>Derrota en la Arena</strong><br>Fuiste derrotado por un oponente de Nivel ${opponentLevel}<br>Tu racha terminó.`);
            }
            inArena = false;
            checkLevelUp();
        }

        function checkLevelUp() {
            while (myPlayer.exp >= myPlayer.expMax) {
                const newLevel = myPlayer.level + 1;
                const isMilestone = (newLevel % 5 === 0);
                myPlayer.level = newLevel;
                myPlayer.exp = 0;
                myPlayer.expMax = Math.floor(myPlayer.expMax * 1.55);
                levelUpStats(isMilestone);
                const milestoneMsg = isMilestone ? '<br><strong>¡Hito alcanzado!</strong>' : '';
                addMessage(`🌟 <strong>¡Ascensión!</strong> Nivel ${myPlayer.level} alcanzado ✨${milestoneMsg}`);
                if (isWebxdc) {
                    safeSendUpdate({ type: 'level_up', player: myPlayer.name, level: myPlayer.level, milestone: isMilestone }, `${myPlayer.name} alcanzó nivel ${myPlayer.level}`, `Nivel ${myPlayer.level}${isMilestone ? ' ⭐' : ''}`);
                }
            }
        }

        let activeWorldEvents = [];

        function showEvents() {
            let msg = '🌟 <strong>Eventos Mundiales Activos</strong><br><br>';
            if (activeWorldEvents.length === 0) {
                randomEvents.forEach(event => {
                    if (Math.random() < event.chance * 10) {
                        activeWorldEvents.push({ ...event, startTime: Date.now(), endTime: Date.now() + (event.duration || 1) * 60 * 1000 });
                    }
                });
            }
            if (activeWorldEvents.length === 0) {
                msg += 'No hay eventos activos en este momento.<br>Los eventos aparecen aleatoriamente durante tus aventuras.';
            } else {
                activeWorldEvents = activeWorldEvents.filter(e => e.endTime > Date.now());
                activeWorldEvents.forEach(event => {
                    const timeLeft = Math.ceil((event.endTime - Date.now()) / 60000);
                    let effectDesc = '';
                    switch(event.effect) {
                        case 'double_exp': effectDesc = '✨ Doble experiencia'; break;
                        case 'discount': effectDesc = '🏪 30% descuento'; break;
                        case 'hard_mode': effectDesc = '⚔️ Enemigos más fuertes'; break;
                        case 'free_rest': effectDesc = '🌙 Descansos gratuitos'; break;
                        case 'free_item': effectDesc = '🎁 Ítem gratis chance'; break;
                    }
                    msg += `🌈 <strong>${event.name}</strong><br>${effectDesc}<br>⏱️ ${timeLeft} min<br><br>`;
                });
            }
            addMessage(msg);
        }

        function challengePVP() {
            if (myPlayer.stamina < 5) { addMessage('❌ Necesitas 5 de energía para PvP.'); return; }
            myPlayer.stamina -= 5;
            const opponents = ['DragonSlayer99', 'MysticMage', 'NightAssassin', 'HolyPaladin'];
            const opponent = opponents[Math.floor(Math.random() * opponents.length)];
            const opponentLevel = Math.max(1, myPlayer.level + Math.floor(Math.random() * 10) - 5);
            const winChance = 0.4 + (myPlayer.level / (opponentLevel + myPlayer.level)) * 0.4;
            const won = Math.random() < winChance;
            
            if (won) {
                const rewardGold = Math.floor(200 + opponentLevel * 25);
                const rewardExp = Math.floor(300 + opponentLevel * 40);
                const trophy = Math.floor(Math.random() * 3) + 1;
                myPlayer.gold += rewardGold;
                myPlayer.exp += rewardExp;
                myPlayer.stats.pvpWins = (myPlayer.stats.pvpWins || 0) + 1;
                myPlayer.pvpTrophies = (myPlayer.pvpTrophies || 0) + trophy;
                addMessage(`⚔️ <strong>¡Victoria PvP!</strong><br>Derrotaste a ${opponent} (Nvl ${opponentLevel})<br>💎 ${rewardGold} • ✨ ${rewardExp} • 🏆 +${trophy}`);
            } else {
                const penaltyGold = Math.floor(myPlayer.gold * 0.05);
                myPlayer.gold = Math.max(0, myPlayer.gold - penaltyGold);
                myPlayer.stats.pvpLosses = (myPlayer.stats.pvpLosses || 0) + 1;
                addMessage(`💀 <strong>Derrota PvP</strong><br>Derrotado por ${opponent}<br>Penalización: ${penaltyGold} 💎`);
            }
            checkLevelUp();
        }

        function startRaid() {
            if (myPlayer.stamina < 10) { addMessage('❌ Necesitas 10 de energía para una Raid.'); return; }
            if (myPlayer.level < 20) { addMessage('❌ Necesitas nivel 20 mínimo para Raids.'); return; }
            myPlayer.stamina -= 10;
            const raidBosses = [
                { name: 'Dragón Ancestral', hp: 500, atk: 45, exp: 1000, gold: 500 },
                { name: 'Rey Demoníaco', hp: 600, atk: 50, exp: 1200, gold: 600 },
                { name: 'Titán de Hielo', hp: 700, atk: 40, exp: 1400, gold: 700 },
                { name: 'Fénix Eterno', hp: 650, atk: 48, exp: 1300, gold: 650 }
            ];
            const boss = raidBosses[Math.floor(Math.random() * raidBosses.length)];
            const playerPower = myPlayer.atk + myPlayer.def + (myPlayer.level * 3);
            const bossPower = boss.atk + (boss.hp / 10);
            const winChance = Math.min(0.9, Math.max(0.2, 0.5 + (playerPower - bossPower) / 50));
            
            if (Math.random() < winChance) {
                myPlayer.gold += boss.gold;
                myPlayer.exp += boss.exp;
                myPlayer.stats.bossesDefeated += 1;
                myPlayer.stats.raidsCompleted = (myPlayer.stats.raidsCompleted || 0) + 1;
                if (Math.random() < 0.3) {
                    const pool = Math.random() < 0.5 ? possibleWeapons : possibleArmors;
                    const filteredPool = pool.filter(item => item.tier !== 'comun' && item.minLevel <= myPlayer.level + 5);
                    if (filteredPool.length > 0) {
                        const item = {...filteredPool[Math.floor(Math.random() * filteredPool.length)]};
                        myPlayer.inventory.push(item);
                        addMessage(`🎁 ¡Drop! ${item.name}`);
                    }
                }
                addMessage(`⚔️ <strong>¡Raid Completada!</strong><br>${boss.name} derrotado<br>💎 ${boss.gold} • ✨ ${boss.exp}`);
                if (isWebxdc) {
                    safeSendUpdate({ type: 'raid_complete', player: myPlayer.name, boss: boss.name }, `${myPlayer.name} derrotó a ${boss.name}`, `Raid: ${boss.name}`);
                }
            } else {
                myPlayer.hp = Math.max(1, myPlayer.hp - Math.floor(myPlayer.maxHp * 0.5));
                addMessage(`💀 <strong>Raid Fallida</strong><br>${boss.name} te derrotó`);
            }
            checkLevelUp();
        }

        const titlesList = [
            { id: 'novice_guardian', name: 'Guardián Novato', requirement: 'Nivel 5', minLevel: 5 },
            { id: 'brave_warrior', name: 'Guerrero Valiente', requirement: '10 Victorias Arena', minLevel: 10 },
            { id: 'treasure_hunter', name: 'Cazatesoros', requirement: '5000 Cristales', minLevel: 15 },
            { id: 'dragon_slayer', name: 'Matadragones', requirement: '10 Bosses', minLevel: 25 },
            { id: 'arena_champion', name: 'Campeón de Arena', requirement: 'Racha 10', minLevel: 30 },
            { id: 'legendary_hero', name: 'Héroe Legendario', requirement: 'Nivel 50', minLevel: 50 }
        ];

        function showTitles() {
            let msg = '🎖️ <strong>Títulos Disponibles</strong><br><br>';
            titlesList.forEach((title, i) => {
                const canUnlock = myPlayer.level >= title.minLevel;
                const isEquipped = myPlayer.equippedTitle === title.id;
                if (isEquipped) { msg += `👑 <span style="color:#f59e0b">${title.name}</span> [EQUIPADO]<br>`; }
                else if (canUnlock) { msg += `✅ ${title.name} — ${title.requirement}<br>`; }
                else { msg += `🔒 ${title.name} — ${title.requirement}<br>`; }
            });
            msg += '<br>/equipTitle [número] para equipar';
            addMessage(msg);
        }

        function equipTitle(titleNum) {
            if (isNaN(titleNum) || titleNum < 1 || titleNum > titlesList.length) { addMessage('❌ Número inválido.'); return; }
            const title = titlesList[titleNum - 1];
            if (myPlayer.level < title.minLevel) { addMessage(`❌ Necesitas nivel ${title.minLevel}.`); return; }
            myPlayer.equippedTitle = title.id;
            calculateStats();
            addMessage(`👑 Título equipado: ${title.name}`);
        }


        window.onload = () => {
            createRealmButtons();
            initWebxdcListener(); // ✅ Inicializar listener de webxdc
            
            if (loadProgress()) {
                document.getElementById('welcome').style.display = 'none';
                gameStarted = true;
                calculateStats();
                addMessage(`🌌 Bienvenido de vuelta, <strong>${myPlayer.name}</strong> ✨`);
            } else {
                addMessage("🌠 <strong>Eternal Realms</strong><br>Mundo compartido listo. Crea tu guardián para comenzar.", true);
            }
        };
    </script>
</body>
</html>
