<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Realms</title>
    <!-- ✅ Referencia obligatoria para webxdc (NO incluir en el ZIP) -->
    <script src="webxdc.js" onerror="this.style.display='none'"></script>
    <!-- Hoja de estilos modularizada -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="chat-container"></div>
    
    <!-- Indicador de acción en curso -->
    <div id="action-timer" style="text-align: center; padding: 8px; background: #1e2937; color: #fbbf24; font-size: 14px; display: none;"></div>
    
    <div class="quick-bar">
        <button class="quick-btn" onclick="quickCommand('/me')">/me</button>
        <button class="quick-btn" onclick="quickCommand('/quest')">/quest</button>
        <button class="quick-btn" onclick="quickCommand('/dungeon')">/dungeon</button>
        <button class="quick-btn" onclick="quickCommand('/rest')">/rest</button>
        <button class="quick-btn" onclick="quickCommand('/equip')">/equip</button>
        <button class="quick-btn" onclick="quickCommand('/world')">/world</button>
        <button class="quick-btn" onclick="quickCommand('/help')">/help</button>
        <button class="quick-btn" id="reset-btn" onclick="resetGame()" style="background:#ef4444;">🔄 Reset</button>
    </div>

    <div class="input-bar">
        <input type="text" id="command-input" placeholder="Comando (/me, /quest, /rest, /equip...)" autocomplete="off">
        <button onclick="sendCommand()">➤</button>
    </div>

    <div id="welcome">
        <div style="max-width: 460px;">
            <h1 style="font-size: 34px; margin-bottom: 10px; color: #c4b5fd;">🌌 Eternal Realms</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">RPG multijugador con mundo compartido.</p>
            
            <h3 style="margin-bottom: 12px; text-align:left;">Elige tu Reino</h3>
            <div id="realm-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); gap: 8px; margin-bottom: 30px;"></div>
            
            <button onclick="startGame()" id="start-btn" style="width:100%; padding:16px; background:#a78bfa; color:#0f172a; border:none; border-radius:9999px; font-size:18px; font-weight:600; opacity:0.6; cursor:not-allowed;">
                🌟 Unirse al Mundo Compartido
            </button>
        </div>
    </div>

    <!-- Scripts modularizados -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
